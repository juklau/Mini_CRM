services:
  web:
    image: httpd:2.4
    container_name: mini-crm-klaudia-web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./html:/usr/local/apache2/htdocs/
      - ./js:/usr/local/apache2/htdocs/js/
      - ./image:/usr/local/apache2/htdocs/image/
    networks:
      - admin_proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: admin_proxy

      traefik.http.middlewares.mini-crm-klaudia-https-redirect.redirectregex.regex: "^http://mini-crm-klaudia\\.iris\\.a3n\\.fr(.*)"
      traefik.http.middlewares.mini-crm-klaudia-https-redirect.redirectregex.replacement: "https://mini-crm-klaudia.iris.a3n.fr:4433$$1"
      traefik.http.middlewares.mini-crm-klaudia-https-redirect.redirectregex.permanent: "true"

      traefik.http.routers.mini-crm-klaudia-http.entrypoints: web
      traefik.http.routers.mini-crm-klaudia-http.rule: "Host(`mini-crm-klaudia.iris.a3n.fr`)"
      traefik.http.routers.mini-crm-klaudia-http.middlewares: mini-crm-klaudia-https-redirect
      traefik.http.routers.mini-crm-klaudia-http.service: mini-crm-klaudia-svc

      traefik.http.routers.mini-crm-klaudia.entrypoints: websecure
      traefik.http.routers.mini-crm-klaudia.rule: "Host(`mini-crm-klaudia.iris.a3n.fr`)"
      traefik.http.routers.mini-crm-klaudia.tls: "true"
      traefik.http.routers.mini-crm-klaudia.tls.certresolver: letsencrypt
      traefik.http.routers.mini-crm-klaudia.service: mini-crm-klaudia-svc
      traefik.http.routers.mini-crm-klaudia.middlewares: mini-crm-klaudia-security

      traefik.http.services.mini-crm-klaudia-svc.loadbalancer.server.port: "80"

      traefik.http.middlewares.mini-crm-klaudia-security.headers.stsSeconds: "31536000"
      traefik.http.middlewares.mini-crm-klaudia-security.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.mini-crm-klaudia-security.headers.stsPreload: "true"
      traefik.http.middlewares.mini-crm-klaudia-security.headers.forceSTSHeader: "true"
      traefik.http.middlewares.mini-crm-klaudia-security.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.mini-crm-klaudia-security.headers.browserXssFilter: "true"

networks:
  admin_proxy:
    external: true
